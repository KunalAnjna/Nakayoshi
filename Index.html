<html lang="en">
<head>
    <meta charset="UTF-8">

   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
   
    <title>Home</title>
    <Style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        Body{
            margin-top: 100px
        }
       .navbar{
    width: 100%;
    min-height: 70px;
    background-color: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 40px;
    position: fixed;
    top: 0;
    z-index: 1000;
    font-size:20px;
}
p{
    text-align: justify;
     
}

/* LOGO */
.nav-logo{
    width: 160px;
    height: 55px;
}

.logo{
    width: 100%;
    height: 100%;
    background-image: url(Assets/Logo.jpeg);
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    transition: transform 0.3s ease;
}

.logo:hover{
    transform: scale(1.05);
}

/* MENU */
.menu{
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 25px;
}

/* LINKS */
.menu a{
    text-decoration: none;
    color: black;
    position: relative;
    transition: 0.3s;
}

/* UNDERLINE */
.menu a::after{
    content: "";
    position: absolute;
    width: 0%;
    height: 2px;
    background: rgb(129, 129, 218);
    left: 0;
    bottom: -4px;
    transition: 0.3s;
}

.menu a:hover::after{
    width: 100%;
}

.menu a:hover{
    color: rgb(129, 129, 218);
}

/* DROPDOWN */
.dropdown{
    position: relative;
}

.dropdown-menu{
    position: absolute;
    top: 100%;
    left: 0;
    width: 220px;
    background: white;
    display: none;
    flex-direction: column;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    opacity: 0;
    transform: translateY(5px);
    transition: 0.3s;
    font-size: 16px;
}

.dropdown-menu {
    display: none;
    opacity: 0;
    transform: translateY(10px);
    transition: 0.3s;
}

.dropdown.active .dropdown-menu {
    display: flex;
    opacity: 1;
    transform: translateY(0);
}
.dropdown-menu p{
    padding: 10px;
}

.dropdown-menu p:hover{
    background: #f2f2f2;
}

/* BUTTON */
button{
    background: #FF4742;
    border: 1px solid #FF4742;
    border-radius: 6px;
    color: white;
    cursor: pointer;
    font-size: 16px;
    padding: 8px 14px;
    transition: all 0.3s ease;
}

button:hover{
    background: white;
    color: #FF4742;
    transform: translateY(2px);
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}

#button-tag{
    color: #ffffff;
    text-decoration: none;
}

#button-tag:hover{
    color: #FF4742;
}

button:active{
    transform: scale(0.95);
}
.menu a.active {
    color: rgb(129, 129, 218);
}

.menu a.active::after {
    width: 100%;
}

/* ========================= */
/* 📱 MOBILE VIEW */
/* ========================= */
@media (min-width: 1000px) and (max-width: 1450px){

    .navbar{
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        padding: 10px 20px;
        flex-wrap: nowrap;
    }

    .nav-logo{
        width: 130px;
        height: 45px;
        flex-shrink: 0;
    }

    .menu{
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        gap: 25px;
        flex-wrap: nowrap;
        /* overflow-x: auto; -- yeh hatao, dropdown block ho raha tha */
        overflow: visible;
    }

    .menu::-webkit-scrollbar{
        display: none;
    }

    .menu a{
        font-size: 20px;
        white-space: nowrap;
    }

    button{
        font-size: 12px;
        padding: 6px 10px;
        flex-shrink: 0;
        white-space: nowrap;
    }

    .dropdown{
        position: relative;
    }

    .dropdown-menu{
        position: absolute;
        top: 100%;
        left: 0;
        z-index: 9999;
    }
}
/* ========================= */
/* 📱 MOBILE SAME LINE NAVBAR */
/* ========================= */

@media (max-width: 1000px){

    
    .navbar{ 
       
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 0 25px 0 10px;   /* right side extra gap */
        overflow-x: auto;
    }

    /* scrollbar hide */
    
    .menu::-webkit-scrollbar{
        display: none;
    }

    .nav-logo{
        width: 120px;
        height: 40px;
        flex-shrink: 0;
    }

    .menu{
        width: 100%;
        margin-bottom: 3px;
        padding-right: 5px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: row;
        gap: 15px;
        flex-shrink: 0;
        
    }

    .menu a{ 
        flex-shrink: 0;
        font-size: 14px;
        white-space: nowrap;
    }
    .dropdown{
display:flex;
align-items:center;
}
@media (max-width: 768px) {
    .dropdown-menu {
        position: static; /* important */
        width: 100%;
    }
}

.menu{
padding:0 12px;
}

.menu{
overflow-x:auto;
padding-right:25px;
}
    button{
        font-size: 12px;
        padding: 6px 10px;
        margin-left: 10px;
        flex-shrink: 0;
    }

}
/* ========================= */
/* 📲 TABLET VIEW */
/* ========================= */

@media (max-width: 1023px){

    .navbar{
        display: flex;
        justify-content: space-evenly;
        padding: 10px 25px;
         overflow-x: auto;
    }

    .menu{
        display: flex;
        justify-content: space-evenly;
        align-items: center;
        gap: 10px;
    }
      .menu::-webkit-scrollbar{
        display: none;
    }
      button{
        font-size: 12px;
        padding: 6px 10px;
        margin-left: 10px;
        flex-shrink: 0;
    }
 .menu a{
        font-size: 14px;
        white-space: nowrap;
    }
    .nav-logo{
        width: 130px;
        height: 45px;
    }
}

Section{

    font-size: 24px;
text-align: center;}
Footer{
    background: #10055b;
    padding: 20px;
    text-align: center;
    color: white;
}
